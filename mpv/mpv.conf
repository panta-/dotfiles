# video
vo=opengl-hq,
hwdec=auto
fs=yes
ontop=yes

# audio
alang=jp,jpn,el,ell,gr,gre,en,eng,
audio-device=alsa/plug:audio

# subtitles
slang=el,ell,gr,gre,en,eng
sub-auto=fuzzy
sub-paths=sub:Subtitles:subtitles
