# video
vo=opengl-hq,
hwdec=auto
fs=yes
ontop=yes

# audio
alang=jp,jpn,el,gr,gre,en,eng,

# subtitles
slang=el,gr,gre,en,eng
sub-auto=fuzzy
sub-paths=sub:Subtitles:subtitles
# compatibility: fall back to Windows-1253 code page (Greek)
sub-codepage=utf8:cp1253

# osd
osd-level=1

# profiles
[tv]
x11-name=TV
vo=opengl,
audio-device='portaudio/HDA Intel PCH: HDMI 0 (hw:0,3)'
msg-level=all=error

[yt]
ytdl=yes
ytdl-format=best
