# video
fs=yes
ontop=yes

# audio
alang=jp,jpn,el,ell,gr,gre,en,eng,

# subtitles
slang=el,ell,gr,gre,en,eng
sub-auto=fuzzy
sub-file-paths=sub:Subtitles:subtitles

# icc profile
