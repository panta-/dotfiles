# video
fs=yes
ontop=yes
hwdec=auto

# audio
alang=jp,jpn,el,ell,gr,gre,en,eng,
audio-device=alsa
audio-normalize-downmix=yes

# subtitles
slang=el,ell,gr,gre,en,eng
sub-auto=fuzzy
sub-file-paths=sub:Subtitles:subtitles

# profiles
profile=opengl-hq

[tv]
x11-name=TV
audio-device=alsa/hdmi
script=~/.config/mpv/tv/xrandr.lua
no-ytdl

[audio]
video=no
