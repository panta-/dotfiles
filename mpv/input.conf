# Video
F1 set video-aspect 4:3
F2 set video-aspect 5:3
F3 set video-aspect 16:9
F4 set video-aspect 1.85:1
F5 set video-aspect 2.39:1
F6 set video-aspect -1

Alt+RIGHT add video-rotate 90
Alt+LEFT add video-rotate -90
Alt+- add video-zoom -0.25
Alt+= add video-zoom 0.25
Alt+h add video-pan-x -0.05
Alt+l add video-pan-x 0.05
Alt+j add video-pan-y 0.05
Alt+k add video-pan-y -0.05
Alt+BS set video-zoom 0; set video-pan-x 0; set video-pan-y 0

# Audio
TAB cycle_values audio-device auto alsa/hdmi
H set audio-device alsa/default:CARD=Headset # crashes if device is unavailable

# Subtitles
Z sub-step -1 # immediately display next    subtitle
X sub-step +1 #                     previous
