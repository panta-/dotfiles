# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
		output_format = "i3bar"
		colors = true
		interval = 5
}

#order += "ipv6"
#order += "disk /"
#order += "run_watch DHCP"
#order += "run_watch VPN"
#order += "ethernet ens9"
order += "wireless wlp3s0"
order += "battery 0"
order += "cpu_temperature 0"
order += "cpu_usage"
order += "load"
order += "tztime local"
order += "volume master"

wireless wlp3s0 {
		format_up = " (%quality @ %essid) %ip"
		format_down = ""
}

ethernet ens9 {
		format_up = " %ip (%speed)"
		format_down = " down"
}

battery 0 {
		format = " %status %percentage %remaining (%consumption)"
		last_full_capacity = true
		integer_battery_capacity = true
		low_threshold = 30
		threshold_type = time
}

run_watch DHCP {
		pidfile = "/var/run/dhcpcd-wlp3s0.pid"
}

run_watch VPN {
		pidfile = "/var/run/vpnc/pid"
}

tztime local {
		format = " %Y-%m-%d %H:%M"
}

cpu_temperature 0 {
		format = " %degrees°C"
		max_threshold = 86
}

cpu_usage {
		format = " %usage"
}

load {
		format = " %1min %5min %15min"
		max_threshold = 4
}

disk "/" {
		format = "  %avail"
}

volume master {
		format = " %volume"
		format_muted = " (%volume)"
		device = "default"
		mixer = "Master"
		mixer_idx = 0
}
